services:
  caddy:
    image: caddy:2
    container_name: homelab-caddy
    restart: unless-stopped
    depends_on:
      - vaultwarden
      - gitea
      - grafana
    ports: 
      - "${PORT}:80"
    volumes:
      - ../proxy/Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - homelab

  vaultwarden:
    image: vaultwarden/server:latest
    container_name: homelab-vaultwarden
    restart: unless-stopped
    volumes:
      - ../data/vaultwarden:/data
    networks:
      homelab:
        aliases:
          - vaultwarden


  gitea:
    image: gitea/gitea:latest
    container_name: homelab-gitea
    restart: unless-stopped
    volumes:
      - ../data/gitea:/data
    networks:
      homelab:
        aliases:
          - gitea

  grafana:
    image: grafana/grafana:latest
    container_name: homelab-grafana
    restart: unless-stopped
    volumes:
      - ../data/grafana:/var/lib/grafana
    networks:
      homelab:
        aliases:
          - grafana

networks:
  homelab:

volumes:
  caddy_data:
  caddy_config:
