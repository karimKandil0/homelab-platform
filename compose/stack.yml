services:
  caddy:
    image: caddy:2
    container_name: homelab-caddy
    restart: unless-stopped
    environment:
      - HOME_HOST=${HOME_HOST}
      - VAULT_HOST=${VAULT_HOST}
      - GITEA_HOST=${GITEA_HOST}
      - GRAFANA_HOST=${GRAFANA_HOST}
    ports: 
      - "${PORT:-8080}:80"
    volumes:
      - ../proxy/Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - homelab

  homepage:
    image: ghcr.io/gethomepage/homepage:latest
    container_name: homelab-homepage
    environment:
      - HOST=0.0.0.0
      - PORT=3000
      - HOMEPAGE_ALLOWED_HOSTS=${HOME_HOST}:${PORT}
    volumes:
      - ../homepage:/app/config
    restart: unless-stopped
    networks:
      - homelab

  vaultwarden:
    image: vaultwarden/server:latest
    container_name: homelab-vaultwarden
    restart: unless-stopped
    volumes:
      - ../data/vaultwarden:/data
    networks:
      homelab:
        aliases:
          - vaultwarden


  gitea:
    image: gitea/gitea:latest
    container_name: homelab-gitea
    restart: unless-stopped
    volumes:
      - ../data/gitea:/data
    networks:
      homelab:
        aliases:
          - gitea

  grafana:
    image: grafana/grafana:latest
    container_name: homelab-grafana
    restart: unless-stopped
    volumes:
      - ../data/grafana:/var/lib/grafana
    networks:
      homelab:
        aliases:
          - grafana

networks:
  homelab:

volumes:
  caddy_data:
  caddy_config:
